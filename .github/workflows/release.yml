name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs: {}

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall -q link2context tests

      - name: Run tests
        run: python -m pytest tests -q

      - name: Build package
        run: python -m build

      - name: Create or update GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          RELEASE_FLAGS=""
          case "$TAG_NAME" in
            v0.*) RELEASE_FLAGS="--prerelease" ;;
          esac
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --title "Link2Context $TAG_NAME" --notes "Automated release for $TAG_NAME." $RELEASE_FLAGS
          gh release upload "$TAG_NAME" dist/* --clobber
